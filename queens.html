        var backdrop = document.getElementById("html_messy_grid");

                backdrop.style.backgroundColor = 'white';
                for (var i = 0; i < text_box_flexbox.length; i++) {
                    text_box_flexbox[i].style.color = 'black';
                }
            } else {
                backdrop.style.backgroundColor = 'black';
                for (var i = 0; i < text_box_flexbox.length; i++) {
                    text_box_flexbox[i].style.color = 'white';
                }
            }
